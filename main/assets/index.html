<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>333Mvd Kanban App</title>
  <link rel="stylesheet" href="styles.css">
  <!-- <link rel="stylesheet" href="./styles.css"> -->
  <script type="module" src="main.js"></script>
  <!-- <script type="module" src="./main.js"></script> -->
</head>

<body>
  <div class="hidden" id="growPrompt"></div>
  <div id="dialog" class="hidden">
    <div id="dialogBody">
      <button class="button-close button-close__extra button-close__dialog"></button>
      <div class="dialogContent">
      </div>
    </div>
  </div>
  <header>
    <div id="headerWrap">
      <h1 data-app-title="board" class="top-menu-title hidden">Board</h1>
      <h1 data-app-title="books" class="top-menu-title hidden">Books</h1>
      <h1 data-app-title="events" class="top-menu-title hidden">Events</h1>
  
      <div data-screen-tools="board" class="top-tools hidden">
        <button data-screen-switch="events" class="switch-screen"></button>
        <button data-screen-switch="books" class="switch-screen"></button>
        <button id="boards-button" data-header-mode-trigger="boardsList"></button>
        <button data-toggle-menu-trigger="board" class="menu-toggle"></button>
      </div>
  
      <div data-screen-tools="books" class="top-tools hidden">
        <button id="addBook"></button>
        <button data-screen-switch="events" class="switch-screen"></button>
        <button data-screen-switch="board" class="switch-screen"></button>
        <button data-toggle-menu-trigger="books" class="menu-toggle"></button>
      </div>
  
      <div data-screen-tools="events" class="top-tools hidden">
        <button data-screen-switch="books" class="switch-screen"></button>
        <button data-screen-switch="board" class="switch-screen"></button>
        <button data-toggle-menu-trigger="events" class="menu-toggle"></button>
      </div>
    </div>

    <section data-toggle-menu-target="board" class="menu hidden">
      <div id="menu-content">
        <button id="rename-board" data-header-mode-trigger="renameBoard">Rename board</button>
        <button id="delete-board" data-header-mode-trigger="deleteBoard">Delete board</button>
        <button id="manage-ranks" data-header-mode-trigger="ranks">Manage ranks</button>
        <button id="show-stats" data-header-mode-trigger="stats">Show stats</button>
      </div>
    </section>

    <section data-toggle-menu-target="books" class="menu hidden">
      <button>some books action</button>
    </section>

    <section data-toggle-menu-target="events" class="menu hidden">
      <button>some events action</button>
    </section>

    <div id="statsUI" data-header-mode="stats" class="hidden">
      <h3 class="top-menu-title">Counters</h3>
      <div id="stats"></div>
      <div id="reset-message" class="hidden">Сбросить счетчики досок?</div>
      <button id="reset-stats-confirm" class="board-management-button hidden">Yes</button>
      <button id="reset-stats-cancel" class="board-management-button hidden">Нет</button>
      <button class="js-cancel-current button-close"></button>
      <button id="reset-stats" class="board-management-button">Reset</button>
    </div>

    <div id="rename-board-block" data-header-mode="renameBoard" class="hidden">
      <h3 class="top-menu-title">Rename board</h3>
      <button class="js-cancel-current button-close"></button>
      <input type="search" id="rename-board-input" />
      <button id="confirm-rename" class="board-management-button" disabled>Save</button>
      <button id="cancel-rename" class="js-cancel-current board-management-button">Cancel</button>
    </div>

    <div id="delete-board-block" data-header-mode="deleteBoard" class="hidden">
      <h3 class="top-menu-title">Delete board</h3>
      <button class="js-cancel-current button-close"></button>
      <p>Delete this board with all columns and tasks?</p>
      <button id="delete-confirm" class="board-management-button">Delete</button>
      <button id="delete-cancel" class="js-cancel-current board-management-button">Cancel</button>
    </div>

    <div id="ranks-block" data-header-mode="ranks" class="hidden"></div>

    <div id="boards-list" data-header-mode="boardsList" class="hidden">
      <h3 class="top-menu-title">Boards</h3>
      <div id="boards-buttons"></div>
      <button id="create-board">Create board</button>
      <button id="close-boards-list" class="js-cancel-current button-close"></button>
    </div>
  </header>


  <main id="board" class="hidden">
    <div id="columns"></div>
    <button id="add-column"></button>
  </main>

  <section id="books" class="hidden">
    <div id="addBookUi" class="hidden">
      <form name="addBookForm" action="javascript:void(0);">
        <input type="text" id="bookName" placeholder="name" required><br>
        <input type="text" id="bookKey" placeholder="key" required><br>
        <input type="number" id="size" placeholder="size" required><br>
        <input type="number" id="startIndex" placeholder="start column index"><br>
        <select class="js-book-board" id="bookBoard" required></select><br>
        <select class="js-book-board-color" id="bookBoardColor" required></select><br>
        <button type="submit" class="js-add-book-confirm">Save</button>
        <button id="addBookCancel">Cancel</button>
      </form>
    </div>
    <div id="booksListContainer"></div>
  </section>

  <section id="events" class="hidden">
    <div id="eventsListContainer"></div>
  </section>
</body>

</html>
